<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cookina</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <header class="top-image">
    <img src="/images/nav.png" alt="Top Banner">
  </header>
  <section class="hero">
    <h1 class="logo">Cookina</h1>
    <div class="floating-items"></div>
    <div class="down-hint">scroll ↓</div>
  </section>

  <section class="search-area second-window">
    <div class="food-cards-horizontal">
      <div class="food-card" data-dish="Soup">🍛 Quick Meals</div>
      <div class="food-card" data-dish="Pasta">🍝 Comfort Food</div>
      <div class="food-card" data-dish="Salad">🥗 Healthy</div>
      <div class="food-card" data-dish="Cake">🍰 Desserts</div>
    </div>
    <div class="search-box">
      <input id="dishInput" placeholder="Type a dish..." aria-label="Dish name" autocomplete="off">
      <button id="searchBtn" type="button" onclick="searchDish()">Find Recipe</button>
    </div>
    <div id="searchFeedback" class="search-feedback"></div>
    <div id="recipeResults" class="recipe-results"></div>
    <div class="illustration-flashcard">
      <img id="flashImage" src="/images/f1.jpg" alt="Flashcard">
    </div>
  </section>

  <section class="recipe-section hidden">
    <button id="backToSearch" class="back-btn">← Back</button>
    <div class="recipe-card">
      <h2 id="recipeTitle" class="recipe-title"></h2>
      <ul id="recipeSteps"></ul>
    </div>
  </section>

  <section class="planner-section">
    <h2 class="planner-title">🍓 My Cookina Planner</h2>
    <div class="planner-grid">
      <div class="planner-column">
        <h3>🍳 Already Made Recipes</h3>
        <button class="add-btn" onclick="addPlannerItem('made')">＋ Add</button>
        <ul id="made" class="planner-list"></ul>
      </div>
      <div class="planner-column">
        <h3>📝 To-Do Recipes</h3>
        <button class="add-btn" onclick="addPlannerItem('todo')">＋ Add</button>
        <ul id="todo" class="planner-list"></ul>
      </div>
      <div class="planner-column">
        <h3>🛒 Ingredients to Purchase</h3>
        <button class="add-btn" onclick="addPlannerItem('buy')">＋ Add</button>
        <ul id="buy" class="planner-list"></ul>
      </div>
    </div>
  </section>
</main>

<footer class="project-footer">
  © 2025 Cookina — Web Technologies Project. All rights reserved.
</footer>

<script src="script.js" defer></script>
</body>
</html>
